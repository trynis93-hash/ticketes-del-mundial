<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ticket para el mundial</title>
    <link rel="stylesheet" href="ticket.css" />
  </head>
  <body>
    <h1>venta de tickets</h1>
    <p class="subtitle">adquiere tus entradas para los partidos del mundial</p>
    <div class="layout">
      <div class="panel">
        <div class="panel-header">comprar ticket</div>
        <div class="form-body">
          <div class="field">
            <label for="inp-nombre">nombre del comprador</label>
            <input
              type="text"
              id="inp-nombre"
              placeholder="Ej: Juan Pérez"
              autocomplete="name"
            />
            <span class="field-error" id="err-nombre"></span>
          </div>
          <div class="field">
            <label for="inp-fecha">fecha del partido</label>
            <input type="date" id="inp-fecha" />
            <span class="field-error" id="err-fecha"></span>
          </div>
          <div class="field">
            <label for="inp-partido">partido</label>
            <select id="inp-partido">
              <option value="">selecciona un partido</option>
              <option value="Argentina vs Brasil">Argentina vs Brasil</option>
              <option value="Alemania vs Francia">Alemania vs Francia</option>
              <option value="España vs Italia">España vs Italia</option>
              <option value="Colombia vs Uruguay">Colombia vs Uruguay</option>
              <option value="México vs EE.UU">México vs EE.UU</option>
            </select>
            <span class="field-error" id="err-partido"></span>
          </div>
          <div class="field">
            <label for="inp-horario">horario</label>
            <select id="inp-horario">
              <option value="">selecciona un horario</option>
              <option value="14:00 - 17:00">14:00 - 17:00</option>
              <option value="18:00 - 21:00">18:00 - 21:00</option>
              <option value="22:00 - 01:00">22:00 - 01:00</option>
            </select>
            <span class="field-error" id="err-horario"></span>
          </div>
          <div class="field">
            <label for="inp-estadio">estadio</label>
            <select id="inp-estadio">
              <option value="">selecciona un estadio</option>
              <option value="MetLife Stadium - EE.UU">
                MetLife Stadium — EE.UU
              </option>
              <option value="Maracanã - Brasil">Maracanã — Brasil</option>
              <option value="Estadio Azteca - México">
                Estadio Azteca — México
              </option>
            </select>
            <span class="field-error" id="err-estadio"></span>
          </div>
          <div class="field">
            <label for="inp-precio">precio por ticket</label>
            <select id="inp-precio">
              <option value="">selecciona un precio</option>
              <option value="1000000">$1.000.000 — Tribuna</option>
              <option value="5000000">$5.000.000 — Preferencial</option>
              <option value="10000000">$10.000.000 — VIP</option>
            </select>
            <span class="field-error" id="err-precio"></span>
          </div>
          <div class="field">
            <label for="inp-cantidad">cantidad de tickets</label>
            <input
              type="number"
              id="inp-cantidad"
              min="1"
              max="10"
              step="1"
              placeholder="1"
            />
            <span class="field-error" id="err-cantidad"></span>
          </div>
          <div class="field">
            <label for="inp-pago">método de pago</label>
            <select id="inp-pago">
              <option value="">selecciona un método</option>
              <option value="Tarjeta de crédito">Tarjeta de crédito</option>
              <option value="PayPal">PayPal</option>
              <option value="Efectivo">Efectivo</option>
              <option value="Nequi">Nequi</option>
              <option value="Daviplata">Daviplata</option>
            </select>
            <span class="field-error" id="err-pago"></span>
          </div>
          <div class="field">
            <label for="inp-email">
              correo electrónico <span class="optional">(opcional)</span>
            </label>
            <input
              type="email"
              id="inp-email"
              placeholder="Ej: juan@correo.com"
              autocomplete="email"
            />
            <span class="field-error" id="err-email"></span>
          </div>
          <button class="btn btn-primary" onclick="handleComprar()">
            🎟️ comprar ticket
          </button>
        </div>
      </div>
      <div id="ticket-container"></div>
    </div>
    <div id="toast" class="toast"></div>
    <script src="ticket.js"></script>
  </body>
</html>
